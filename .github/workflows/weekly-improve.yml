name: Weekly Content Improvement

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 2 * * 1'  # 毎週月曜 AM 11:00 JST
  workflow_dispatch:      # 手動実行も可能

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch analytics data
        env:
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GSC_SITE_URL:               ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID:            ${{ secrets.GA4_PROPERTY_ID }}
        run: node scripts/fetch-analytics.mjs

      - name: Improve content with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/improve-content.mjs

      - name: Push improvement branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ 改善が必要な記事はありませんでした"
            echo "### ✅ 改善対象なし" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          BRANCH="auto/content-improvement-${{ github.run_number }}"
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Auto-improve content based on GSC/GA4 analysis"
          git push origin "$BRANCH"
          REPORT=$(cat improvement-report.md)
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🤖 コンテンツ自動改善 (run #${{ github.run_number }})" \
            --body "$REPORT")
          echo "### 🤖 PRを作成しました" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**👉 $PR_URL**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat improvement-report.md >> $GITHUB_STEP_SUMMARY
